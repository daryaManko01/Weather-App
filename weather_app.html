<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        .main_bg {
            background: linear-gradient(180deg, #3948A0 0%, #151A3A 100%);
            background-repeat: no-repeat;
            padding: 115px 155px 115px 155px;
        }

        .h1 {
            color: #FFF;
            font-family: Inter;
            font-size: 58px;
            font-style: normal;
            text-align: center;
        }

        .h2 {
            color: #FFF;
            text-align: center;
            font-family: Inter;
            font-size: 20px;
        }

        .description {
            display: flex;
            flex-direction: column;
            gap: 2px;
            justify-content: center;
        }

        .input {
            display: flex;
            padding: 13px 312px 14px 13px;
            border-radius: 100px;
            color: #353B5F;
            font-family: Inter;
            font-size: 14px;
            font-style: normal;
            background-color: #FFF;
            border: 1px solid white;
        }

        .button_search {
            border-radius: 100%;
            background-color: white;
            border: 1px solid white;
            padding: 13px 15px;
        }

        .form {
            display: flex;
            flex-direction: row;
            gap: 13px;
            justify-content: center;
            margin-top: 35px;
        }

        .weather {
            display: flex;
            flex-direction: row;
            gap: 0px;
            color: #FFF;
            font-family: Inter;
            font-size: 58px;
            font-style: normal;
        }

        .size {
            font-size: 24px;
        }

        .time {
            color: #FFF;
            font-family: Inter;
            font-size: 24px;
        }

        .text_data {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: center;
            margin-top: 70px;
        }

        .text {
            color: #FFF;
            font-family: Inter;
            font-size: 36px;
            font-style: normal;

        }

        .icon {
            width: 70px;
            height: 70px;
        }

        .bg_data {
            display: inline-block;
            flex-direction: column;
            padding: 60px 17px 60px 17px;
            background-color: #273277;
            border-radius: 50px;
            justify-content: center;
        }

        .data {
            display: flex;
            flex-direction: row;
            gap: 12px;
        }

        .bg {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            border-radius: 50px;
            border: 1px solid #2B3888;
            background: #1B2770;
            padding: 22px 22px 22px 92px;
            margin-top: 45px;
        }
        .row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 3px;
        }
    </style>
</head>

<body class="main_bg">
    <div id="card">
        <div class="description">
            <span class="h1"><strong>Weather App</strong></span>
            <div class="row">
                <span class="h2">Today,</span>
                <span id="date" class="h2">11 may</span>
            </div>
        </div>
        <div id="form" class="form">
            <input id="search" class="input" type="text" name="number" placeholder="Enter name">
            <button id="button" class="button_search"><img src="src/Vector.svg"></button>
        </div>
    </div>


    <div class="bg">
        <div>
            <span id="city" class="text">Belarus</span>
            <div id="temp" class="weather">
                <span><strong>27</strong></span>
                <span><strong>.</strong></span>
                <sapn><strong>C</strong></sapn>
            </div>
        </div>

        <div class="data">
           
        </div>
    </div>

    <script src="weather_app.js"></script>

</body>
